# Continuous integration: run the Python test suite and verify the web build.
# Data/model-dependent tests skip themselves when artifacts are absent, so CI
# stays green without committing the dataset or trained models.

name: ci

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: System libs (OpenMP for XGBoost)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        # Public env vars are unset here; the app builds and runs in its
        # "auth not configured" state, which is exactly the local fallback.
        run: npm run build
